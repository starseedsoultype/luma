<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Luma — Trusted Circle</title>
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body>
<div class="app-container">
  <header class="header">
    <button class="btn-ghost" onclick="history.back()">←</button>
    <div class="header-title" data-i18n="circle_title">Trusted Circle</div>
    <div></div>
  </header>

  <div class="page-content" style="padding-top:64px">
    <div class="category-pills" style="margin-bottom:20px">
      <button class="pill pill--active circle-tab" data-tab="pending" data-i18n="circle_pending">Pending</button>
      <button class="pill circle-tab" data-tab="voted" data-i18n="circle_my_votes">My Votes</button>
    </div>
    <div id="circle-list"></div>
  </div>
</div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/cities.js"></script>
<script src="js/i18n.js"></script>
<script src="js/supabase.js"></script>
<script src="js/circle.js"></script>
<script>
  const tg = window.Telegram?.WebApp;
  if (tg) { tg.ready(); tg.expand(); }
  const App = { lang: localStorage.getItem('luma_lang') || 'en', user: null };
  setLang(App.lang);
  getCurrentUser().then(u => { App.user = u; loadCirclePage(); });
</script>
</body>
</html>
