<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Luma — Admin</title>
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body>
<div class="app-container">
  <header class="header">
    <button class="btn-ghost" onclick="history.back()">←</button>
    <div class="header-title" data-i18n="admin_title">Admin</div>
    <div></div>
  </header>

  <div class="page-content" style="padding-top:64px">

    <!-- Tabs -->
    <div class="category-pills" style="margin-bottom:20px">
      <button class="pill pill--active admin-tab" data-tab="applications" data-i18n="admin_applications">Applications</button>
      <button class="pill admin-tab" data-tab="helpers" data-i18n="admin_helpers">Helpers</button>
      <button class="pill admin-tab" data-tab="users" data-i18n="admin_users">Users</button>
      <button class="pill admin-tab" data-tab="stats" data-i18n="admin_stats">Stats</button>
    </div>

    <!-- Applications tab -->
    <div id="admin-tab-applications">
      <div style="display:flex;gap:8px;margin-bottom:16px">
        <select id="admin-city-filter" class="form-select" style="flex:1" onchange="loadAdminApplications()">
          <option value="">All cities</option>
        </select>
        <select id="admin-status-filter" class="form-select" style="flex:1" onchange="loadAdminApplications()">
          <option value="pending" data-i18n="status_pending">Pending</option>
          <option value="approved" data-i18n="status_approved">Approved</option>
          <option value="rejected" data-i18n="status_rejected">Rejected</option>
          <option value="">All</option>
        </select>
      </div>
      <div id="admin-applications-list"></div>
    </div>

    <!-- Helpers tab -->
    <div id="admin-tab-helpers" class="page--hidden">
      <div id="admin-helpers-list"></div>
    </div>

    <!-- Users tab -->
    <div id="admin-tab-users" class="page--hidden">
      <div id="admin-users-list"></div>
    </div>

    <!-- Stats tab -->
    <div id="admin-tab-stats" class="page--hidden">
      <div id="admin-stats-content"></div>
    </div>

  </div>
</div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/cities.js"></script>
<script src="js/i18n.js"></script>
<script src="js/supabase.js"></script>
<script src="js/admin.js"></script>
<script>
  const tg = window.Telegram?.WebApp;
  if (tg) { tg.ready(); tg.expand(); }
  const App = { lang: localStorage.getItem('luma_lang') || 'en', city: localStorage.getItem('luma_city') || 'phangan', user: null };
  setLang(App.lang);
  initAdminPage();
</script>
</body>
</html>
